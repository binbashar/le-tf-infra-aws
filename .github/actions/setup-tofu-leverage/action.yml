name: "Setup OpenTofu and Leverage CLI"
description: "Install OpenTofu and Leverage CLI with verification"

inputs:
  tofu_version:
    description: "OpenTofu version to install"
    required: false
    default: "1.8.7"
  leverage_version:
    description: "Leverage CLI version to install"
    required: false
    default: "2.2.0rc5"
  python_version:
    description: "Python version for Leverage CLI"
    required: false
    default: "3.13"

runs:
  using: composite
  steps:
    - name: Setup Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
      with:
        python-version: ${{ inputs.python_version }}

    - name: Install OpenTofu
      shell: bash
      run: |
        set -euo pipefail
        # Install to a user-local dir on PATH instead of `sudo`-moving into
        # /usr/local/bin, so the action also works on self-hosted runners that
        # restrict root/passwordless sudo.
        TOFU_VERSION="${{ inputs.tofu_version }}"
        wget -q "https://github.com/opentofu/opentofu/releases/download/v${TOFU_VERSION}/tofu_${TOFU_VERSION}_linux_amd64.zip"
        mkdir -p ~/.local/bin
        unzip -qo tofu_${TOFU_VERSION}_linux_amd64.zip tofu -d ~/.local/bin
        rm tofu_${TOFU_VERSION}_linux_amd64.zip
        chmod +x ~/.local/bin/tofu
        echo "$HOME/.local/bin" >> $GITHUB_PATH
        ~/.local/bin/tofu version

    - name: Install Leverage CLI
      shell: bash
      run: |
        set -euo pipefail
        # Install into an isolated venv, then symlink only the `leverage`
        # entrypoint into a user-local dir on PATH (no sudo). Adding the venv's
        # bin/ to $GITHUB_PATH would also shadow the runner's python/pip with the
        # venv's, which can make later steps unexpectedly run inside the venv. The
        # leverage shebang points at the venv's python, so the symlink alone is
        # sufficient.
        python3 -m venv ~/.leverage-venv
        ~/.leverage-venv/bin/pip install --upgrade pip
        ~/.leverage-venv/bin/pip install leverage==${{ inputs.leverage_version }}
        mkdir -p ~/.local/bin
        ln -sf ~/.leverage-venv/bin/leverage ~/.local/bin/leverage
        echo "$HOME/.local/bin" >> $GITHUB_PATH
        ~/.local/bin/leverage --version

    - name: Verify Required Binaries
      shell: bash
      run: |
        set -euo pipefail
        echo "Verifying system binaries for dockerless Leverage CLI..."
        if ! command -v tofu &> /dev/null; then
          echo "OpenTofu (tofu) not found"
          exit 1
        fi
        if ! command -v aws &> /dev/null; then
          echo "AWS CLI not found"
          exit 1
        fi
        echo "OpenTofu: $(tofu version | head -1)"
        echo "AWS CLI: $(aws --version)"
        echo "Leverage: $(leverage --version)"
