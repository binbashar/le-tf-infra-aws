name: Claude Code Review

# Lightweight PR review based on file context only
# NO Terraform execution - just analyzes changed files
# Limited to management/global/sso/ path (will be expanded to all layers)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'management/global/sso/**'
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: read

jobs:
  # Job 0: Authorization gate for comment-triggered events
  authorize:
    name: Authorize
    if: |
      github.event_name == 'issue_comment' ||
      github.event_name == 'pull_request_review_comment'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      authorized: ${{ steps.auth.outputs.authorized }}
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
        with:
          sparse-checkout: .github/actions/authorize-collaborator
          fetch-depth: 1

      - name: Check collaborator permission
        id: auth
        uses: ./.github/actions/authorize-collaborator
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

  eyes-reaction:
    name: Add Eyes Reaction
    needs: [authorize]
    if: |
      always() &&
      ((github.event_name == 'issue_comment' && needs.authorize.outputs.authorized == 'true' &&
        (contains(github.event.comment.body, 'review') || contains(github.event.comment.body, '@claude'))) ||
       (github.event_name == 'pull_request_review_comment' && needs.authorize.outputs.authorized == 'true' &&
        (contains(github.event.comment.body, 'review') || contains(github.event.comment.body, '@claude'))))
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
        with:
          sparse-checkout: .github/actions/add-eyes-reaction
          fetch-depth: 1

      - name: Add eyes reaction
        uses: ./.github/actions/add-eyes-reaction
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          comment_id: ${{ github.event.comment.id }}

  analyze-pr-context:
    name: PR Context Analysis
    needs: [authorize, eyes-reaction]
    if: |
      always() &&
      (needs.eyes-reaction.result == 'success' || needs.eyes-reaction.result == 'skipped') &&
      ((github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false) ||
       (github.event_name == 'issue_comment' && needs.authorize.outputs.authorized == 'true') ||
       (github.event_name == 'pull_request_review_comment' && needs.authorize.outputs.authorized == 'true'))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
      issues: read
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
        with:
          fetch-depth: 0

      - name: Get Changed Files
        id: changed-files
        run: |
          BASE_REF="${{ github.event.pull_request.base.sha }}"
          HEAD_REF="${{ github.event.pull_request.head.sha }}"

          echo "Analyzing changes between $BASE_REF and $HEAD_REF"
          echo "Path filter: management/global/sso/**"

          CHANGED_FILES=$(git diff --name-only "$BASE_REF" "$HEAD_REF" | grep '^management/global/sso/')

          if [[ -z "$CHANGED_FILES" ]]; then
            echo "No files changed in management/global/sso/"
            echo "has-changes=false" >> $GITHUB_OUTPUT
          else
            echo "Changed files:"
            echo "$CHANGED_FILES"
            echo "has-changes=true" >> $GITHUB_OUTPUT
            echo "$CHANGED_FILES" > changed-files.txt
          fi

      - name: Get File Diffs
        if: steps.changed-files.outputs.has-changes == 'true'
        run: |
          BASE_REF="${{ github.event.pull_request.base.sha }}"
          HEAD_REF="${{ github.event.pull_request.head.sha }}"

          git diff "$BASE_REF" "$HEAD_REF" -- management/global/sso/ > file-diffs.txt
          echo "Diff generated ($(wc -l < file-diffs.txt) lines)"

      - name: Run Claude Code PR Analysis
        if: steps.changed-files.outputs.has-changes == 'true'
        id: claude-analysis
        uses: anthropics/claude-code-action@928c84b37e02abd33f08826a2200058c68633a85  # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Read and follow `.claude/skills/ci-review-code.md`.
            Context:
              PR=#${{ github.event.pull_request.number }}
              Title=${{ github.event.pull_request.title }}
              Author=@${{ github.event.pull_request.user.login }}
              Path=management/global/sso/

          claude_args: '--allowed-tools "Task,Read,Grep,Glob,Bash(gh pr comment:*),Bash(gh pr view:*),Bash(gh issue view:*),Bash(gh issue list:*),mcp__github_comment__*,mcp__github_ci__*"'

      - name: No Changes Detected
        if: steps.changed-files.outputs.has-changes != 'true'
        run: |
          echo "No files changed in management/global/sso/ path"
          echo "This PR does not affect the monitored path, skipping analysis"
