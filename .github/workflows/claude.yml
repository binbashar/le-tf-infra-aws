name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened]
  pull_request_review:
    types: [submitted]

jobs:
  eyes-reaction:
    name: Add Eyes Reaction
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Add eyes reaction
        timeout-minutes: 1
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            COMMENT_ID="${{ github.event.comment.id }}"
          elif [ "${{ github.event_name }}" = "pull_request_review_comment" ]; then
            COMMENT_ID="${{ github.event.comment.id }}"
          else
            echo "No comment to react to"
            exit 0
          fi

          echo "Adding 👀 reaction to comment ID: $COMMENT_ID"
          gh api repos/${{ github.repository }}/issues/comments/$COMMENT_ID/reactions \
            --method POST \
            --field content='eyes' || {
            echo "Failed to add reaction"
            exit 0
          }

          echo "✅ Eyes reaction added successfully"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  claude:
    needs: eyes-reaction
    if: |
      always() &&
      (needs.eyes-reaction.result == 'success' || needs.eyes-reaction.result == 'skipped') &&
      ((github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude'))))
    timeout-minutes: 30
    concurrency:
      group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.run_id }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required for Claude to make code changes
      pull-requests: write  # Required for Claude to comment and create PRs
      issues: write  # Required for Claude to comment on issues
      id-token: write
      actions: read  # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
        with:
          fetch-depth: 1

      - name: Run Claude Code with Intelligent Agent Routing
        id: claude
        uses: anthropics/claude-code-action@928c84b37e02abd33f08826a2200058c68633a85  # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # Intelligent Agent Routing System
          prompt: |
            You are Claude Code with access to specialized agents for the Binbash Leverage Reference Architecture.

            ## PRE-ROUTING: SPECIAL TERRAFORM COMMANDS

            **Before any other analysis**, check if the comment/request is one of these special commands:

            ### `@claude tf-plan` — Delta Terraform Plan
            If the comment contains `@claude tf-plan` (but NOT `@claude tf-plan full`):
            1. Use `gh pr view` to identify the PR number and changed files
            2. Identify the changed Terraform layer(s) from the PR diff (pattern: `{account}/{region}/{layer}/`)
            3. Post a comment on the PR triggering the plan workflow:
               ```
               gh pr comment <PR_NUMBER> --body "/terraform plan"
               ```
            4. Reply confirming: "Triggered delta Terraform plan for the changed layers. The plan results will be posted as a PR comment with changed resources only."

            ### `@claude tf-plan full` — Full Terraform Plan
            If the comment contains `@claude tf-plan full`:
            1. Use `gh pr view` to identify the PR number and changed files
            2. Post a comment triggering the full plan:
               ```
               gh pr comment <PR_NUMBER> --body "/terraform plan full"
               ```
            3. Reply confirming: "Triggered full Terraform plan. Complete unfiltered output will be posted as a PR comment."

            ### `@claude tf-apply` — Apply with Permission Check
            If the comment contains `@claude tf-apply`:
            1. Check if the commenter has admin or write permission using:
               ```
               gh api repos/{owner}/{repo}/collaborators/{username}/permission --jq '.permission'
               ```
            2. If permission is NOT `admin` or `write`: reply with "Permission denied. Only contributors with write or admin access can trigger apply."
            3. If permission IS sufficient:
               a. Use `gh pr view` to identify changed layers
               b. Post a comment triggering the apply workflow:
                  ```
                  gh pr comment <PR_NUMBER> --body "/terraform apply"
                  ```
               c. Reply confirming: "Triggered Terraform apply for the changed layers. Apply output and rollback information will be posted as a PR comment."

            ---

            ## INTELLIGENT AGENT ROUTING

            If the request is NOT one of the special commands above, proceed with intelligent routing:

            1. **ANALYZE CONTEXT** - Examine:
               - File paths and directories being worked on
               - Layer types (security-*, cost-*, k8s-*, databases-*, etc.)
               - Keywords in PR titles, issue descriptions, comments
               - Type of operation requested (fix, feature, documentation, etc.)

            2. **SELECT SPECIALIZED AGENT** - Based on analysis, choose the most appropriate agent:
               - **security-compliance**: For security layers, secrets-manager, iam, kms, compliance
               - **cost-optimization**: For cost analysis, billing, infracost, resource optimization
               - **terraform-layer**: For general infrastructure, .tf files, layer operations
               - **feature-implementation**: For new features, enhancements, development
               - **issue-fix**: For bugs, errors, troubleshooting, fixes
               - **documentation**: For .md files, README, guides, documentation
               - **dependency-update**: For version updates, renovate, security patches

            3. **USE TASK TOOL** - Delegate to the selected specialized agent:
               ```
               Task tool with subagent_type: [selected-agent]
               ```

            4. **PROVIDE REASONING** - Briefly explain why you selected that specific agent.

            ## AGENT SELECTION EXAMPLES

            - Working on `apps-devstg/us-east-1/secrets-manager/` → Use `security-compliance`
            - Infracost analysis or cost optimization → Use `cost-optimization`
            - General .tf file changes or layer operations → Use `terraform-layer`
            - Bug fixes or error resolution → Use `issue-fix`
            - Documentation updates → Use `documentation`

            ## REFERENCE GUIDE

            Read `.claude/docs/agent-guide.md` for detailed agent selection criteria.

            ## INSTRUCTIONS

            1. Check for special terraform commands FIRST (`@claude tf-plan`, `@claude tf-plan full`, `@claude tf-apply`)
            2. If no special command, analyze context and select the most appropriate specialized agent
            3. Use the Task tool to delegate with proper subagent_type for general requests
            4. Let the specialized agent handle the specific expertise
            5. Provide clear reasoning for your agent selection

            This intelligent routing ensures each request gets specialized expertise without rigid if/else logic.

          # Configure Claude with advanced options
          claude_args: |
            --max-turns 15
            --allowed-tools "Task,Read,Grep,Glob,Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*),Bash(gh api:*),Bash(git:*),Bash(find:*),Bash(grep:*),Bash(cat:*),Bash(ls:*),mcp__github_comment__*,mcp__github_ci__*"
