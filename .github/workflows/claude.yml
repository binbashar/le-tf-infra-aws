name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened]
  pull_request_review:
    types: [submitted]

jobs:
  # Job 0: Authorization gate — only repo collaborators (write/admin) can trigger
  authorize:
    name: Authorize
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      authorized: ${{ steps.auth.outputs.authorized }}
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
        with:
          sparse-checkout: .github/actions/authorize-collaborator
          fetch-depth: 1

      - name: Check collaborator permission
        id: auth
        uses: ./.github/actions/authorize-collaborator
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

  eyes-reaction:
    name: Add Eyes Reaction
    needs: [authorize]
    if: |
      needs.authorize.outputs.authorized == 'true' &&
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
        with:
          sparse-checkout: .github/actions/add-eyes-reaction
          fetch-depth: 1

      - name: Add eyes reaction
        uses: ./.github/actions/add-eyes-reaction
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          comment_id: ${{ github.event.comment.id }}

  claude:
    needs: [authorize, eyes-reaction]
    if: |
      always() &&
      needs.authorize.outputs.authorized == 'true' &&
      (needs.eyes-reaction.result == 'success' || needs.eyes-reaction.result == 'skipped') &&
      ((github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude'))))
    timeout-minutes: 30
    concurrency:
      group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.run_id }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    permissions:
      contents: read  # Claude reads code and posts comments via gh
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
        with:
          fetch-depth: 1

      - name: Run Claude Code with Intelligent Agent Routing
        id: claude
        uses: anthropics/claude-code-action@928c84b37e02abd33f08826a2200058c68633a85  # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # Intelligent Agent Routing — skill-based prompt
          prompt: |
            Read and follow `.claude/skills/ci-route-request.md`.
            Context: Event=${{ github.event_name }}, Actor=${{ github.actor }}

          claude_args: |
            --max-turns 15
            --allowed-tools "Task,Read,Grep,Glob,Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*),Bash(gh api:*),Bash(git:*),Bash(find:*),Bash(grep:*),Bash(cat:*),Bash(ls:*),mcp__github_comment__*,mcp__github_ci__*"
