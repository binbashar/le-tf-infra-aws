# Install cert-manager CRDs via Helm as well
installCRDs: true

# Set log level
global:
  logLevel: 2

# Be explicit about where cluster resources are meant to be found
# e.g. ClusterIssuer and corresponding secrets
clusterResourceNamespace: certmanager

# Use Google's DNSs
podDnsPolicy: "None"
podDnsConfig:
  nameservers:
    - "8.8.8.8"
    - "1.1.1.1"

# Pod Security Context
securityContext:
  enabled: "true"

# We'll use a feature of EKS called IAM roles for service accounts
serviceAccount:
  create: true
  name: certmanager
  annotations:
    eks.amazonaws.com/role-arn: ${roleArn}

# Skip the post-install API sanity-check job. It runs as a k8s Job with no
# tolerations/nodeSelector and was getting stuck in Pending: the apps node hits
# pod-density limits and the tools node has a `stack: tools` taint it doesn't
# tolerate. cert-manager itself works without it; this is just a one-shot probe.
startupapicheck:
  enabled: false
